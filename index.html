<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}html,body,#root{min-height:100vh}
    body{background:#0A0D11;color:#D0D5DC;font-family:'DM Sans',sans-serif;font-feature-settings:"cv02","cv03","cv04","cv11"}
    /* Tabular numerics so KPI numbers, char counts, dates align cleanly */
    .tabnum{font-variant-numeric:tabular-nums}
    ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(200,205,211,0.14);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(200,205,211,0.22)}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @keyframes activePulse{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,0.45)}50%{box-shadow:0 0 0 6px rgba(52,211,153,0)}}
    @keyframes accentSlide{0%{transform:translateX(-100%)}50%{transform:translateX(0)}100%{transform:translateX(100%)}}
    button:hover{opacity:0.92}
    button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid #D9AA5A;outline-offset:2px;border-radius:6px}
    /* Section card hover lift kept for grouped inner tiles only */
    .tile-hover{transition:transform 0.18s ease,box-shadow 0.18s ease,border-color 0.18s ease}
    .tile-hover:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
    /* Section accent stripe — a thin gradient bar across the card's top edge */
    .accent-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;pointer-events:none}
    /* Reduced motion preferences */
    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
      .tile-hover:hover{transform:none}
    }
    #loading-msg{display:flex;align-items:center;justify-content:center;height:100vh;color:#9CA3AF;font-size:14px;font-family:'DM Sans',sans-serif}
    /* First-paint accent line at top of page */
    .page-shimmer{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#D9AA5A,transparent);animation:accentSlide 1.6s ease-out 1;z-index:100;pointer-events:none}

  <script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const { BarChart, Bar, AreaChart, ComposedChart, Area, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

// ─── Palette ─────────────────────────────────────────────────────────────────
// Contrast targets: body text ≥ 7:1, secondary labels ≥ 5:1, captions ≥ 4.5:1.
// Surface tones are layered: bg < surface < surfaceElevated.
const C = {
  bg:"#0A0D11",
  surface:"rgba(200,205,211,0.05)",
  surfaceElevated:"rgba(200,205,211,0.08)",
  surfaceInset:"rgba(0,0,0,0.25)",
  border:"rgba(200,205,211,0.12)",
  borderStrong:"rgba(200,205,211,0.18)",
  gridLine:"rgba(200,205,211,0.06)",
  text:"#D0D5DC",        // body, ≈8:1
  bright:"#F0F2F5",      // headings, ≈11:1
  muted:"#9CA3AF",       // secondary labels, ≈7:1
  dim:"#7C8694",         // captions, ≈5.2:1
  faint:"#5B6473",       // disabled/decorative, ≈4:1
  accent:"#D9AA5A",      // gold — brand, active states
  accentBright:"#EFC078",
  accentSoft:"rgba(217,170,90,0.10)",
  accentBdr:"rgba(217,170,90,0.30)",
  blue:"#5AB8D9",blueSoft:"rgba(90,184,217,0.10)",blueBdr:"rgba(90,184,217,0.28)",
  green:"#34D399",greenSoft:"rgba(52,211,153,0.10)",greenBdr:"rgba(52,211,153,0.28)",
  red:"#F87171",redSoft:"rgba(248,113,113,0.10)",redBdr:"rgba(248,113,113,0.26)",
  pink:"#D95A8C",pinkSoft:"rgba(217,90,140,0.10)",pinkBdr:"rgba(217,90,140,0.28)",
  lime:"#8CD95A",limeSoft:"rgba(140,217,90,0.10)",limeBdr:"rgba(140,217,90,0.28)",
  purple:"#B05AD9",purpleSoft:"rgba(176,90,217,0.10)",purpleBdr:"rgba(176,90,217,0.28)",
};
const EVT=[C.accent,C.blue,C.pink,C.lime,C.purple];
const GEO=["#D9AA5A","#C49A4E","#AF8A42","#9A7A36","#856A2A","#705A1E","#5B4A12","#463A06","#3A3000","#2E2600"];

// ─── Typography & spacing tokens ─────────────────────────────────────────────
const font=`'DM Sans',sans-serif`;
const mono=`'JetBrains Mono',monospace`;
// Type scale
const T={display:32,h1:22,h2:18,body:14,small:13,caption:12,eyebrow:10};
// Spacing scale — multiples of 4. Use these for consistent rhythm.
const S={xs:4,sm:8,md:12,lg:16,xl:24,xxl:32,xxxl:48,giant:64};
// Section category colors — drive accent stripes on SectionCard
const SECTION_COLORS={
  analytics:C.accent,health:C.accent,kpis:C.accent,
  traffic:C.blue,audience:C.blue,geo:C.accent,events:C.purple,channels:C.lime,
  content:C.lime,calendar:C.lime,queue:C.lime,topic:C.accent,tone:C.accent,drafts:C.accent,thread:C.blue,article:C.purple,
  utm:C.pink,builder:C.pink,history:C.pink,
  settings:C.muted,context:C.lime,brand:C.purple,integrations:C.blue,site:C.accent,defaults:C.accent,
};

// ─── Supabase Configuration ──────────────────────────────────────────────────
const SUPABASE_URL="https://zzxmpemfozerswguzoaz.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_ls5mvx1mB_Wib4dhfxK8hQ__lpZ75w8";
// supabaseClient is initialized lazily after CDN script loads (window.supabase global)
let supabaseClient=null;
const getSupabase=()=>{
  if(supabaseClient) return supabaseClient;
  if(typeof window!=="undefined"&&window.supabase&&window.supabase.createClient){
    supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
    return supabaseClient;
  }
  return null;
};

// ─── Debug logging ──────────────────────────────────────────────────────────
// Only emit operational logs in local dev. In production these are no-ops so
// schema/query details don't leak via devtools.
const IS_DEV=typeof window!=="undefined"&&/^(localhost|127\.0\.0\.1|\[::1\])$/.test(window.location.hostname);
const debugLog=IS_DEV?console.error.bind(console):()=>{};

// ─── Brand monogram ──────────────────────────────────────────────────────────
// Stylised Honoroll "H" — two strokes connected by a notched bar, signaling
// the cut/honor mark. Rendered in SVG for crisp display at any size.
const HonorollMark=({size=32,radius=10,glow=true})=>(<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:size,height:size,borderRadius:radius,background:`linear-gradient(135deg,${C.accent} 0%,${C.accentBright} 100%)`,boxShadow:glow?"0 4px 14px rgba(217,170,90,0.28)":"none",flexShrink:0}}>
  <svg width={Math.round(size*0.62)} height={Math.round(size*0.62)} viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M5 4v16M19 4v16M5 12h14M9 9.5h6v5H9z" stroke="#0A0D11" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
</span>);

// PageBackdrop intentionally renders nothing in the minimalist treatment —
// page identity comes from the SectionCard system + the gold-only header
// logo, no radial wash needed. Kept as a component so call sites keep working.
const PageBackdrop=()=>null;

// Module-level mirror of the current user's id. AuthenticatedApp syncs it via
// useEffect when user.id changes, so the cache key scoping below works without
// every utility needing to thread the user prop through. "anon" when signed out.
let CURRENT_USER_ID="anon";
function setCurrentUserId(id){CURRENT_USER_ID=id?String(id):"anon";}

// Localstorage cache for Umami responses, keyed by (user, path). Fresh hits
// return immediately; stale entries are the fallback when an API call fails
// (rate limit / network / quota). markStale callback lets the caller surface
// "showing stale data" to the UI.
const UMAMI_FRESH_MS=5*60*1000;
function umamiCacheKey(path,region){return `honoroll_umami_${CURRENT_USER_ID}_${region||"def"}_${path}`;}
function readUmamiCache(path,region){
  try{const raw=typeof localStorage!=="undefined"?localStorage.getItem(umamiCacheKey(path,region)):null;
    if(!raw)return null;const parsed=JSON.parse(raw);
    if(!parsed||typeof parsed.ts!=="number"||!("data" in parsed))return null;
    return parsed;
  }catch(e){return null;}
}
function writeUmamiCache(path,region,data){
  try{if(typeof localStorage!=="undefined")localStorage.setItem(umamiCacheKey(path,region),JSON.stringify({ts:Date.now(),data}));}catch(e){}
}

// ─── Security helpers ────────────────────────────────────────────────────────
// Fetch wrapper that attaches the current Supabase access token to every
// request to our authenticated proxies (/api/groq, /api/umami, /api/seo).
// Surfaces a clear error if the user isn't signed in.
async function authedFetch(url,options={}){
  const sb=getSupabase();
  if(!sb)throw new Error("Supabase client not ready");
  const{data:{session}}=await sb.auth.getSession();
  const token=session?.access_token;
  if(!token)throw new Error("You are not signed in. Refresh and try again.");
  return fetch(url,{...options,headers:{...(options.headers||{}),Authorization:`Bearer ${token}`}});
}

// Sanitize LLM-produced SVG before injecting via dangerouslySetInnerHTML.
// Uses DOMPurify when available; falls back to a defensive in-house pass.
function sanitizeSvg(svg){
  if(typeof svg!=="string")return"";
  if(typeof window!=="undefined"&&window.DOMPurify){
    return window.DOMPurify.sanitize(svg,{USE_PROFILES:{svg:true,svgFilters:true}});
  }
  return svg
    .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi,"")
    .replace(/<(foreignObject|iframe|object|embed|use)\b[\s\S]*?<\/\1>/gi,"")
    .replace(/<(foreignObject|iframe|object|embed|use)\b[^>]*\/?>/gi,"")
    .replace(/\son[a-z]+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi,"")
    .replace(/(href|xlink:href)\s*=\s*("|')\s*(javascript|data|vbscript):[^"']*\2/gi,'$1="#"');
}

// Only allow opening http/https URLs in new tabs — refuses javascript:, data:,
// file:, etc. Used for any link constructed from user input (UTM history).
function safeOpenUrl(url){
  if(typeof url!=="string")return false;
  return /^https?:\/\//i.test(url.trim());
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
const toFlag=(code)=>code?String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6-65+c.charCodeAt(0))):"";
const fmt=(n)=>n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"K":n.toString();
const pctD=(c,p)=>{if(!p)return{v:"∞",up:true};const d=((c-p)/p)*100;return{v:Math.abs(d).toFixed(1),up:d>=0};};
const durFmt=(ms,v)=>{if(!v)return"0m 00s";const s=Math.floor(ms/v/1000);return`${Math.floor(s/60)}m ${(s%60).toString().padStart(2,"0")}s`;};
const sleep=(ms)=>new Promise(r=>setTimeout(r,ms));

// ─── Date Range Helpers ──────────────────────────────────────────────────────
const DATE_RANGES = [
  {id:"24h",label:"Last 24h"},
  {id:"7d",label:"Last 7 days"},
  {id:"30d",label:"Last 30 days"},
  {id:"all",label:"All time"},
];

const COMPARE_MODES = [
  {id:"previous",label:"Previous period"},
  {id:"week_ago",label:"Same period last week"},
  {id:"year_ago",label:"Same period last year"},
  {id:"none",label:"No comparison"},
];

const RANGE_DURATIONS_MS = {
  "24h":24*60*60*1000,
  "7d":7*24*60*60*1000,
  "30d":30*24*60*60*1000,
};

function getRange(rangeId) {
  const now=new Date();
  const endAt=now.getTime();
  let startAt;
  switch(rangeId) {
    case "24h": { startAt=endAt-RANGE_DURATIONS_MS["24h"]; break; }
    case "7d": { const s=new Date(now);s.setDate(s.getDate()-6);s.setHours(0,0,0,0);startAt=s.getTime();break; }
    case "30d": { const s=new Date(now);s.setDate(s.getDate()-29);s.setHours(0,0,0,0);startAt=s.getTime();break; }
    case "all": { const s=new Date(2020,0,1);startAt=s.getTime();break; }
    default: { startAt=endAt-RANGE_DURATIONS_MS["24h"]; break; }
  }
  return {startAt,endAt};
}

function getComparisonRange(rangeId,compareMode="previous") {
  if(rangeId==="all"||compareMode==="none") return null;
  const primary=getRange(rangeId);
  const duration=primary.endAt-primary.startAt;
  if(compareMode==="week_ago") {
    const offset=7*24*60*60*1000;
    return {startAt:primary.startAt-offset,endAt:primary.endAt-offset};
  }
  if(compareMode==="year_ago") {
    const start=new Date(primary.startAt);start.setFullYear(start.getFullYear()-1);
    const end=new Date(primary.endAt);end.setFullYear(end.getFullYear()-1);
    return {startAt:start.getTime(),endAt:end.getTime()};
  }
  // previous (default)
  return {startAt:primary.startAt-duration,endAt:primary.startAt};
}

function getTimeUnit(rangeId) {
  if(rangeId==="24h") return "hour";
  return "day";
}

function getCompareLabel(rangeId,compareMode) {
  if(rangeId==="all"||compareMode==="none") return null;
  const map={previous:"previous period",week_ago:"same period last week",year_ago:"same period last year"};
  return map[compareMode]||"previous period";
}

// ─── Umami API Layer ─────────────────────────────────────────────────────────
// umamiFetch with client cache + stale fallback.
// - Returns cached data if cached <5 min old (no API call).
// - Otherwise hits the proxy. On success, caches and returns.
// - On any failure (4xx/5xx/network), returns any cached value regardless of
//   age and calls markStale() so the UI can flag the section as stale.
// - Throws only when both the live call and the cache are unavailable.
async function umamiFetch(path,apiKey,region,opts){
  const markStale=opts&&typeof opts.markStale==="function"?opts.markStale:null;
  const cached=readUmamiCache(path,region);
  const now=Date.now();
  if(cached&&(now-cached.ts)<UMAMI_FRESH_MS){return cached.data;}
  const url=`/api/umami?path=${encodeURIComponent(path)}${region?`&region=${encodeURIComponent(region)}`:""}`;
  try{
    const res=await authedFetch(url,{headers:{"Accept":"application/json"}});
    if(res.ok){const data=await res.json();writeUmamiCache(path,region,data);return data;}
    // Live call failed (likely 429 quota). Fall back to stale cache if we have it.
    if(cached){if(markStale)markStale(res.status===429?"quota":`http-${res.status}`);return cached.data;}
    throw new Error(`Umami ${path}: ${res.status}`);
  }catch(networkErr){
    if(cached){if(markStale)markStale("network");return cached.data;}
    throw networkErr;
  }
}
function qs(params){return Object.entries(params).filter(([,v])=>v!=null).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join("&");}

// ─── Data Fetching Hook ──────────────────────────────────────────────────────
function useAnalyticsData(cfg,site,rangeId,compareMode) {
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(!!cfg&&!!site);
  const [error,setError]=useState(null);
  const fetchAll=useCallback(async()=>{
    if(!cfg||!site)return;
    setLoading(true);setError(null);
    const{key,region,seoKey}=cfg;
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
    const id=site.id;
    const primary=getRange(rangeId);
    const comparison=getComparisonRange(rangeId,compareMode);
    const unit=getTimeUnit(rangeId);
    // Track whether any Umami call in this batch served stale data. The UI
    // uses this to show a small "stale data" pill instead of a hard error.
    let umamiStaleSource=null;
    const U=(p,k,r)=>umamiFetch(p,k,r,{markStale:(reason)=>{if(!umamiStaleSource)umamiStaleSource=reason;}});
    try{
      const batch1=await Promise.all([
        U(`/websites/${id}/stats?${qs(primary)}`,key,region),
        comparison?U(`/websites/${id}/stats?${qs(comparison)}`,key,region):Promise.resolve({pageviews:0,visitors:0,visits:0,bounces:0,totaltime:0}),
        U(`/websites/${id}/active`,key,region),
        U(`/websites/${id}/pageviews?${qs({...primary,unit,timezone:tz})}`,key,region),
      ]);
      await sleep(400);
      const[statsToday,statsYesterday,active,timeSeries]=batch1;
      const batch2=await Promise.all([
        U(`/websites/${id}/metrics?${qs({...primary,type:"path",limit:10})}`,key,region),
        U(`/websites/${id}/metrics?${qs({...primary,type:"referrer",limit:10})}`,key,region),
        U(`/websites/${id}/metrics?${qs({...primary,type:"country",limit:10})}`,key,region),
      ]);
      await sleep(400);
      const[pages,referrers,countries]=batch2;
      const batch3=await Promise.all([
        U(`/websites/${id}/metrics?${qs({...primary,type:"browser",limit:10})}`,key,region),
        U(`/websites/${id}/metrics?${qs({...primary,type:"device",limit:10})}`,key,region),
        U(`/websites/${id}/metrics?${qs({...primary,type:"os",limit:10})}`,key,region),
        U(`/websites/${id}/metrics?${qs({...primary,type:"event",limit:10})}`,key,region),
      ]);
      await sleep(400);
      const[browsers,devices,os,events]=batch3;
      const batch4=await Promise.all([
        U(`/websites/${id}/events/series?${qs({...primary,unit,timezone:tz})}`,key,region),
        U(`/websites/${id}/metrics?${qs({...primary,type:"channel",limit:10})}`,key,region),
      ]);
      const[eventSeries,channels]=batch4;
      const fmtLabel=(x)=>{const d=new Date(x);return unit==="hour"?d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",hour12:false}):d.toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});};
      const timeData=(timeSeries.pageviews||[]).map((pv,i)=>({label:fmtLabel(pv.x),pageviews:pv.y,sessions:timeSeries.sessions?.[i]?.y||0}));
      const fmtM=(arr)=>(arr||[]).map(m=>({name:m.x,value:m.y}));
      const eventsByHour={};const eventNames=new Set();
      (eventSeries||[]).forEach(e=>{const h=fmtLabel(e.t);if(!eventsByHour[h])eventsByHour[h]={label:h};eventsByHour[h][e.x]=(eventsByHour[h][e.x]||0)+e.y;eventNames.add(e.x);});
      let pageSpeed=null,seoAudit=null,pageSpeedStale=false,pageSpeedCachedAt=null;
      const psiCacheKey=`honoroll_pagespeed_${site.domain}`;
      const PSI_TTL_MS=24*60*60*1000;
      // Read any cached PageSpeed entry — even stale (>24h). Fresh hits skip
      // the API call entirely; stale entries act as a fallback when the live
      // API call fails (quota exhausted, FAILED_DOCUMENT_REQUEST, etc).
      let psiCacheRaw=null;
      try{psiCacheRaw=typeof localStorage!=="undefined"?localStorage.getItem(psiCacheKey):null;}catch(e){}
      let psiCache=null;
      try{if(psiCacheRaw)psiCache=JSON.parse(psiCacheRaw);}catch(e){}
      if(psiCache&&psiCache.timestamp&&(Date.now()-psiCache.timestamp)<PSI_TTL_MS){
        if(psiCache.pageSpeed)pageSpeed=psiCache.pageSpeed;
        if(psiCache.seoAudit)seoAudit=psiCache.seoAudit;
      }
      let siteHealthError=null;
      if(!pageSpeed||!seoAudit){
        try{const psiRes=await authedFetch(`/api/pagespeed?domain=${encodeURIComponent(site.domain)}`);
          if(!psiRes.ok){
            let body="";try{const j=await psiRes.json();body=j.error||"";}catch(e){body=await psiRes.text().catch(()=>"");}
            // Live call failed. If we have ANY cache (even >24h old), serve it as stale.
            if(psiCache&&(psiCache.pageSpeed||psiCache.seoAudit)){
              pageSpeed=psiCache.pageSpeed||pageSpeed;
              seoAudit=psiCache.seoAudit||seoAudit;
              pageSpeedStale=true;
              pageSpeedCachedAt=psiCache.timestamp||null;
            }else{
              siteHealthError=`PageSpeed ${psiRes.status}: ${String(body).slice(0,140)}`;
            }
          }else{const psi=await psiRes.json();const lh=psi.lighthouseResult||{};const cats=lh.categories||{};const a=lh.audits||{};
            pageSpeed={performance:Math.round((cats.performance?.score||0)*100),seo:Math.round((cats.seo?.score||0)*100),accessibility:Math.round((cats.accessibility?.score||0)*100),
              vitals:{LCP:{value:a["largest-contentful-paint"]?.displayValue||"—",rating:a["largest-contentful-paint"]?.score>=0.9?"good":a["largest-contentful-paint"]?.score>=0.5?"needs-improvement":"poor"},
                FCP:{value:a["first-contentful-paint"]?.displayValue||"—",rating:a["first-contentful-paint"]?.score>=0.9?"good":a["first-contentful-paint"]?.score>=0.5?"needs-improvement":"poor"},
                CLS:{value:a["cumulative-layout-shift"]?.displayValue||"—",rating:a["cumulative-layout-shift"]?.score>=0.9?"good":a["cumulative-layout-shift"]?.score>=0.5?"needs-improvement":"poor"},
                TTFB:{value:a["server-response-time"]?.displayValue||"—",rating:a["server-response-time"]?.score>=0.9?"good":a["server-response-time"]?.score>=0.5?"needs-improvement":"poor"}}};
            // Derive SEO audit from the same Lighthouse response — no separate third-party call
            const seoCat=cats.seo;
            if(seoCat){
              const score=Math.round((seoCat.score||0)*100);
              const grade=score>=90?"A":score>=80?"B":score>=70?"C":score>=60?"D":"F";
              const priorities=(seoCat.auditRefs||[])
                .map(ref=>({ref,audit:a[ref.id]}))
                .filter(({audit})=>audit&&audit.score!==null&&audit.score<1&&!["informative","notApplicable","manual"].includes(audit.scoreDisplayMode))
                .sort((x,y)=>(y.ref.weight||0)-(x.ref.weight||0))
                .slice(0,6)
                .map(({audit})=>({issue:audit.title||audit.id,severity:audit.score===0?"warning":"info"}));
              seoAudit={score,grade,priorities};
            }
            try{if(typeof localStorage!=="undefined")localStorage.setItem(psiCacheKey,JSON.stringify({timestamp:Date.now(),pageSpeed,seoAudit}));}catch(e){}
          }
        }catch(e){
          // Network failure. If we have ANY cache, serve it as stale.
          if(psiCache&&(psiCache.pageSpeed||psiCache.seoAudit)){
            pageSpeed=psiCache.pageSpeed||pageSpeed;
            seoAudit=psiCache.seoAudit||seoAudit;
            pageSpeedStale=true;
            pageSpeedCachedAt=psiCache.timestamp||null;
          }else{
            siteHealthError=e.message||"Failed to reach PageSpeed";
          }
        }
      }
      setData({statsToday,statsYesterday,active:active.visitors||0,timeSeries:timeData,unit,
        pages:fmtM(pages),referrers:fmtM(referrers),countries:fmtM(countries).map(c=>({...c,code:c.name.length===2?c.name:""})),
        browsers:fmtM(browsers),devices:fmtM(devices),os:fmtM(os),events:fmtM(events),
        eventSeries:Object.values(eventsByHour).sort((a,b)=>a.label.localeCompare(b.label)),topEventNames:[...eventNames].slice(0,5),
        channels:fmtM(channels),pageSpeed,seoAudit,siteHealthError,umamiStaleSource,pageSpeedStale,pageSpeedCachedAt});
    }catch(e){setError(e.message);}finally{setLoading(false);}
  },[cfg,site,rangeId,compareMode]);
  useEffect(()=>{fetchAll();},[fetchAll]);
  return{data,loading,error,refresh:fetchAll};
}

let ACTIVE_AI_MODEL="llama-3.3-70b-versatile";
function setActiveAIModel(m){if(typeof m==="string"&&m)ACTIVE_AI_MODEL=m;}

async function callLLM(systemPrompt,userMessage,maxTokens=4096){
  const res=await authedFetch("/api/groq",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({system:systemPrompt,user:userMessage,max_tokens:maxTokens,temperature:0.7,model:ACTIVE_AI_MODEL})});
  if(!res.ok){
    let msg="";
    try{const j=await res.json();msg=j.error||"";}catch(e){msg=await res.text().catch(()=>"");}
    if(res.status===429)throw new Error(typeof msg==="string"&&msg.length<200?msg:"Rate limit reached. Wait 30–60s and try again.");
    if(res.status===413)throw new Error("Request too large for the selected AI model. Disable some context files in Settings, or switch to Llama 3.3 70B which has a larger per-request budget.");
    throw new Error(`API error ${res.status}: ${String(msg).slice(0,200)}`);
  }
  const d=await res.json();return (d.text||"").replace(/```json|```/g,"").trim();
}

// Robustly parse JSON produced by an LLM. Handles common issues:
// extraneous prose around the JSON, trailing commas, raw newlines inside
// string values. Throws if no parseable object is recoverable.
function parseLLMJson(raw){
  if(!raw||typeof raw!=="string")throw new Error("Empty response");
  let txt=raw.replace(/```json|```/g,"").trim();
  // First attempt: direct parse
  try{return JSON.parse(txt);}catch(e){}
  // Second attempt: slice from first { to last } (or [ to ])
  const objStart=txt.indexOf("{"),objEnd=txt.lastIndexOf("}");
  const arrStart=txt.indexOf("["),arrEnd=txt.lastIndexOf("]");
  let candidate=null;
  if(objStart>=0&&objEnd>objStart)candidate=txt.slice(objStart,objEnd+1);
  else if(arrStart>=0&&arrEnd>arrStart)candidate=txt.slice(arrStart,arrEnd+1);
  if(candidate){
    try{return JSON.parse(candidate);}catch(e){}
    // Third attempt: strip trailing commas before } or ]
    const noTrailing=candidate.replace(/,(\s*[}\]])/g,"$1");
    try{return JSON.parse(noTrailing);}catch(e){}
    // Fourth attempt: escape raw newlines/tabs inside string literals
    const escaped=noTrailing.replace(/"((?:[^"\\]|\\.)*)"/g,(m,inner)=>`"${inner.replace(/\n/g,"\\n").replace(/\r/g,"\\r").replace(/\t/g,"\\t")}"`);
    try{return JSON.parse(escaped);}catch(e){}
  }
  throw new Error("Could not parse LLM JSON response");
}

async function analyzeWithAI(payload,userContext){const sysPrompt=SYS_PROMPT+(userContext||"");const txt=await callLLM(sysPrompt,`Analytics data:\n\n${payload}`);
  try{return parseLLMJson(txt);}catch(e){const tm=txt.match(/"trends"\s*:\s*\[([\s\S]*?)\]/);const sm=txt.match(/"suggestions"\s*:\s*\[([\s\S]*?)\]/);
    const safe=(s)=>{if(!s)return[];try{return JSON.parse(`[${s}]`);}catch{const lb=s.lastIndexOf("}");if(lb>0)try{return JSON.parse(`[${s.slice(0,lb+1)}]`);}catch{return[];}return[];}};
    const trends=safe(tm?.[1]),suggestions=safe(sm?.[1]);if(trends.length||suggestions.length)return{trends,suggestions};throw new Error("Parse failed. Retry.");}}

const EditableText=({value,onChange,maxChars,style:customStyle})=>{
  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState(value);
  const textareaRef=useRef(null);
  useEffect(()=>{setDraft(value);},[value]);
  useEffect(()=>{if(editing&&textareaRef.current){textareaRef.current.focus();textareaRef.current.style.height="auto";textareaRef.current.style.height=textareaRef.current.scrollHeight+"px";}});
  const save=()=>{onChange(draft);setEditing(false);};
  const cancel=()=>{setDraft(value);setEditing(false);};
  const insertEmoji=(emoji)=>{
    const ta=textareaRef.current;if(!ta){setDraft(draft+emoji);return;}
    const start=ta.selectionStart;const end=ta.selectionEnd;
    const newText=draft.slice(0,start)+emoji+draft.slice(end);
    setDraft(newText);
    setTimeout(()=>{ta.focus();ta.setSelectionRange(start+emoji.length,start+emoji.length);ta.style.height="auto";ta.style.height=ta.scrollHeight+"px";},0);
  };
  if(editing) return (<div>
    <textarea ref={textareaRef} value={draft} onChange={e=>{setDraft(e.target.value);e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}}
      onKeyDown={e=>{if(e.key==="Escape")cancel();if(e.key==="Enter"&&e.metaKey)save();}}
      style={{width:"100%",background:"rgba(200,205,211,0.06)",border:`1px solid rgba(217,170,90,0.3)`,borderRadius:8,padding:"10px 14px",fontSize:14,fontFamily:font,color:C.bright,outline:"none",resize:"none",lineHeight:1.6,boxSizing:"border-box",minHeight:60}}/>
    <div style={{display:"flex",gap:8,marginTop:6,justifyContent:"flex-end",alignItems:"center"}}>
      {maxChars&&<span style={{fontSize:10,fontFamily:mono,color:draft.length>maxChars?C.red:C.dim}}>{draft.length}/{maxChars}</span>}
      <EmojiBtn onPick={insertEmoji}/>
      <button onClick={cancel} style={{fontSize:11,fontFamily:mono,color:C.muted,background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 12px",cursor:"pointer"}}>Cancel</button>
      <button onClick={save} style={{fontSize:11,fontFamily:mono,color:C.bg,background:C.accent,border:"none",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontWeight:600}}>Save</button>
    </div>
  </div>);
  return (<div onClick={()=>setEditing(true)} style={{cursor:"text",position:"relative",...customStyle}}>
    <div style={{fontSize:14,color:C.bright,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{value}</div>
    <div style={{position:"absolute",top:4,right:4,fontSize:9,color:C.dim,fontFamily:mono,opacity:0.5}}>click to edit</div>
  </div>);
};

const CopyBtn=({text,label,onCopied})=>{const[copied,setCopied]=useState(false);const copy=()=>{
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>{setCopied(true);if(onCopied)onCopied();setTimeout(()=>setCopied(false),2000);}).catch(()=>fallback());}
    else{fallback();}
  }catch(e){fallback();}
  function fallback(){const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;left:-9999px;top:-9999px";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");setCopied(true);if(onCopied)onCopied();setTimeout(()=>setCopied(false),2000);}catch(e){}document.body.removeChild(ta);}
};return <button onClick={copy} style={{fontSize:T.caption-1,fontFamily:mono,fontWeight:500,color:copied?C.green:C.muted,background:copied?C.greenSoft:C.surfaceElevated,border:`1px solid ${copied?C.greenBdr:C.border}`,borderRadius:6,padding:`${S.xs+1}px ${S.md-2}px`,cursor:"pointer",transition:"all 0.2s",display:"inline-flex",alignItems:"center",gap:S.xs}}>{copied?"✓ Copied":(label||"Copy")}</button>;};
const DraftBadge=()=> <span style={{display:"inline-flex",alignItems:"center",gap:S.xs,fontSize:T.eyebrow,fontWeight:700,fontFamily:mono,color:C.muted,textTransform:"uppercase",letterSpacing:"0.10em",padding:`${S.xs-1}px ${S.sm+1}px`,background:C.surfaceInset,border:`1px solid ${C.border}`,borderRadius:5}}><span style={{width:5,height:5,borderRadius:"50%",background:C.muted}}/>Draft</span>;
const ScheduledBadge=()=> <span style={{display:"inline-flex",alignItems:"center",gap:S.xs,fontSize:T.eyebrow,fontWeight:700,fontFamily:mono,color:C.green,textTransform:"uppercase",letterSpacing:"0.10em",padding:`${S.xs-1}px ${S.sm+1}px`,background:C.greenSoft,border:`1px solid ${C.greenBdr}`,borderRadius:5}}><span style={{width:5,height:5,borderRadius:"50%",background:C.green}}/>Scheduled</span>;
const CharCount=({n})=> {const over=n>280;const near=n>240;return <span className="tabnum" style={{fontSize:T.eyebrow+1,fontFamily:mono,fontWeight:over?700:500,color:over?C.red:near?C.accent:C.dim,padding:`${S.xs-1}px ${S.sm}px`,background:over?C.redSoft:"transparent",borderRadius:4}}>{n}/280</span>;};

const STATUS_COLORS={draft:C.dim,scheduled:C.green,published:C.blue};
const STATUS_LABELS={draft:"Draft",scheduled:"Scheduled",published:"Published"};
const TYPE_COLORS={post:C.accent,thread:C.blue,article:C.purple};
const TYPE_LABELS={post:"Post",thread:"Thread",article:"Article"};

const StatusBadge=({status})=>{const c=STATUS_COLORS[status||"draft"];return <span style={{display:"inline-flex",alignItems:"center",gap:S.xs,fontSize:T.eyebrow,fontWeight:700,fontFamily:mono,color:c,textTransform:"uppercase",letterSpacing:"0.10em",padding:`${S.xs-1}px ${S.sm+1}px`,background:`${c}1A`,border:`1px solid ${c}55`,borderRadius:5}}><span style={{width:5,height:5,borderRadius:"50%",background:c}}/>{STATUS_LABELS[status||"draft"]}</span>;};

// Local-timezone YYYY-MM-DD formatter (avoid UTC drift from toISOString)
const ymd=(d)=>{const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,"0");const day=String(d.getDate()).padStart(2,"0");return `${y}-${m}-${day}`;};
// Native browser date picker — no custom popup, no stacking-context issues.
// The hidden <input type="date"> is anchored to the button via a relative wrapper;
// clicking the button calls showPicker() to open the browser's calendar.
const ScheduleBtn=({onSchedule,scheduledDate})=>{
  const inputRef=React.useRef(null);
  const todayStr=ymd(new Date());
  const openPicker=()=>{
    const el=inputRef.current;if(!el)return;
    if(typeof el.showPicker==="function"){try{el.showPicker();return;}catch(e){}}
    el.focus();el.click();
  };
  const label=scheduledDate?`Scheduled · ${scheduledDate}`:"Schedule";
  return (<span style={{position:"relative",display:"inline-block"}}>
    <button onClick={openPicker} style={{fontSize:11,fontFamily:mono,color:scheduledDate?C.green:C.accent,background:scheduledDate?C.greenSoft:"none",border:`1px solid ${scheduledDate?C.greenBdr:C.accentSoft}`,borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>📅 {label}</button>
    <input ref={inputRef} type="date" min={todayStr} defaultValue={scheduledDate||""} onChange={(e)=>{if(e.target.value)onSchedule(e.target.value);}} style={{position:"absolute",left:0,top:"100%",width:1,height:1,opacity:0,pointerEvents:"none"}}/>
  </span>);
};

  campaign:`You are a senior campaign strategist. Create a Campaign Context document for [PRODUCT_NAME]'s current marketing push.

Campaign name: [CAMPAIGN_NAME]

Generate a markdown document (300-500 words) with these sections:

## Key Messages

const CONTEXT_CATEGORIES=[
  {id:"voice",label:"Brand & Voice",icon:"🎙",desc:"Who you are and how you sound",color:C.accent,placeholder:"Describe your brand identity, voice attributes, words to use/avoid, tone guidelines..."},
  {id:"product",label:"Product",icon:"📦",desc:"What you're talking about",color:C.blue,placeholder:"Product features, value propositions, differentiators, technical details..."},
  {id:"audience",label:"Audience",icon:"👥",desc:"Who you're writing for",color:C.green,placeholder:"Target users, demographics, pain points, what they care about..."},
  {id:"campaign",label:"Campaign",icon:"📢",desc:"What's happening now",color:C.pink,placeholder:"Current launches, promotions, key talking points for this period..."},
  {id:"examples",label:"Examples",icon:"💡",desc:"Reference content to mimic",color:C.purple,placeholder:"Past posts that performed well, tone you want to copy..."},
];
const WORD_LIMIT=2000;
const countWords=(text)=>(text||"").trim().split(/\s+/).filter(Boolean).length;

const ContextFilesPanel=({ctxFiles,show,onToggle,hideClose})=>{
  const{files,loading,error,addFile,toggleActive,updateContent,deleteFile}=ctxFiles;
  const fileRef=useRef(null);
  const[mode,setMode]=useState(null);
  const[draftCategory,setDraftCategory]=useState("voice");
  const[draftLabel,setDraftLabel]=useState("");
  const[draftContent,setDraftContent]=useState("");
  const[expandedFile,setExpandedFile]=useState(null);
  const[editingFile,setEditingFile]=useState(null);
  const[editContent,setEditContent]=useState("");
  const[promptModalCategory,setPromptModalCategory]=useState(null);
  const[saving,setSaving]=useState(false);
  const[opError,setOpError]=useState("");
  const[bulkFiles,setBulkFiles]=useState([]);
  const[bulkCategory,setBulkCategory]=useState("voice");
  const[bulkProgress,setBulkProgress]=useState(null);

  const wordCount=countWords(draftContent);
  const isOverLimit=wordCount>WORD_LIMIT;

  const reset=()=>{setMode(null);setDraftLabel("");setDraftContent("");setDraftCategory("voice");setOpError("");setBulkFiles([]);setBulkProgress(null);};

  const readFileAsText=(file)=>new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=(ev)=>resolve({name:file.name,label:file.name.replace(/\.(md|txt)$/i,""),content:ev.target.result});
    reader.onerror=()=>reject(new Error(`Could not read ${file.name}`));
    reader.readAsText(file);
  });

  const handleFileUpload=async(e)=>{
    const files=Array.from(e.target.files||[]);e.target.value="";
    if(files.length===0)return;
    if(files.length===1){
      try{const f=await readFileAsText(files[0]);setDraftContent(f.content);setDraftLabel(f.label);setMode("paste");}
      catch(err){setOpError(err.message||"Could not read file");}
      return;
    }
    try{const all=await Promise.all(files.map(readFileAsText));setBulkFiles(all);setBulkCategory("voice");setMode("bulk");}
    catch(err){setOpError(err.message||"Could not read one or more files");}
  };

  const updateBulkLabel=(idx,label)=>setBulkFiles(prev=>prev.map((f,i)=>i===idx?{...f,label}:f));
  const removeFromBulk=(idx)=>setBulkFiles(prev=>prev.filter((_,i)=>i!==idx));

  const saveBulk=async()=>{
    if(bulkFiles.length===0)return;
    setSaving(true);setOpError("");setBulkProgress({done:0,total:bulkFiles.length,failed:0});
    let failed=0;
    for(let i=0;i<bulkFiles.length;i++){
      const f=bulkFiles[i];
      if(!f.content?.trim()||!f.label?.trim()){failed++;setBulkProgress({done:i+1,total:bulkFiles.length,failed});continue;}
      try{await addFile({category:bulkCategory,label:f.label,content:f.content});}
      catch(e){failed++;}
      setBulkProgress({done:i+1,total:bulkFiles.length,failed});
    }
    setSaving(false);
    if(failed>0)setOpError(`Uploaded ${bulkFiles.length-failed} of ${bulkFiles.length}. ${failed} failed.`);
    reset();
  };

  const saveFile=async()=>{
    if(!draftContent.trim()||!draftLabel.trim()) return;
    setSaving(true);setOpError("");
    try{await addFile({category:draftCategory,label:draftLabel,content:draftContent});reset();}
    catch(e){setOpError(e.message||"Failed to save");}
    finally{setSaving(false);}
  };

  const handleToggle=async(id)=>{try{await toggleActive(id);}catch(e){setOpError(e.message||"Failed to toggle");}};
  const handleDelete=async(id)=>{try{await deleteFile(id);if(expandedFile===id)setExpandedFile(null);}catch(e){setOpError(e.message||"Failed to delete");}};
  const startEditing=(file)=>{setEditingFile(file.id);setEditContent(file.content);setExpandedFile(file.id);};
  const saveEdit=async(id)=>{try{await updateContent(id,editContent);setEditingFile(null);}catch(e){setOpError(e.message||"Failed to save edit");}};

  const activeCount=files.filter(f=>f.active).length;
  const filesByCategory=CONTEXT_CATEGORIES.reduce((acc,cat)=>{acc[cat.id]=files.filter(f=>f.category===cat.id);return acc;},{});

  if(!show) return null;

  return (<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"22px 24px",marginBottom:24,animation:"fadeIn 0.3s ease-out"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
      <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em"}}>Context Files</div>
      {!hideClose&&<button onClick={onToggle} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:16}}>✕</button>}
    </div>
    <div style={{fontSize:11,color:C.dim,marginBottom:16,lineHeight:1.5}}>Files inform AI generation across all tabs. Toggle each file on/off to control which context applies. Active: <span style={{color:C.green,fontFamily:mono}}>{activeCount}</span> / {files.length}</div>

    {loading&&<div style={{padding:"24px",textAlign:"center",fontSize:13,color:C.muted,fontFamily:mono}}>Loading context files...</div>}
    {error&&<div style={{padding:"12px 14px",marginBottom:16,fontSize:12,color:C.red,background:C.redSoft,border:"1px solid rgba(248,113,113,0.2)",borderRadius:8}}>Load error: {error}</div>}
    {opError&&<div style={{padding:"10px 14px",marginBottom:16,fontSize:12,color:C.red,background:C.redSoft,border:"1px solid rgba(248,113,113,0.2)",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{opError}</span><button onClick={()=>setOpError("")} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14}}>✕</button></div>}

    {/* Add new buttons */}
    {!mode&&<div style={{marginBottom:20}}>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={()=>setMode("paste")} style={{padding:"10px 18px",fontSize:13,fontWeight:600,fontFamily:font,color:C.bg,background:`linear-gradient(135deg,${C.accent},#E8C06A)`,border:"none",borderRadius:8,cursor:"pointer"}}>+ Paste Text</button>
        <button onClick={()=>fileRef.current?.click()} style={{padding:"10px 18px",fontSize:13,fontWeight:600,fontFamily:font,color:C.text,background:"rgba(200,205,211,0.04)",border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer"}}>📁 Upload Files (.txt, .md)</button>
        <input ref={fileRef} type="file" multiple accept=".txt,.md,text/plain,text/markdown" onChange={handleFileUpload} style={{display:"none"}}/>
      </div>
      <div style={{padding:"12px 14px",background:"rgba(176,90,217,0.04)",border:`1px solid rgba(176,90,217,0.15)`,borderRadius:10}}>

// Build context string for prompts from active files
// Cap the combined active-context payload at ~8000 chars (~2000 tokens) so the
// LLM request stays inside Groq's per-minute TPM budget even on 8B Instant.
const MAX_CONTEXT_CHARS=8000;
const buildContextString=(files)=>{
  const active=(files||[]).filter(f=>f.active);
  if(active.length===0) return "";
  // Compute per-file budget; reserve a small wrapper allowance
  const perFile=Math.max(400,Math.floor((MAX_CONTEXT_CHARS-200)/active.length));
  const truncate=(s)=>{if(!s)return"";if(s.length<=perFile)return s;return s.slice(0,perFile-30).trimEnd()+"\n…[truncated]";};
  const sections=CONTEXT_CATEGORIES.map(cat=>{
    const catFiles=active.filter(f=>f.category===cat.id);
    if(catFiles.length===0) return null;
    const sectionHeader=`### ${cat.label.toUpperCase()} CONTEXT`;
    const filesContent=catFiles.map(f=>`[${f.label}]\n${truncate(f.content)}`).join("\n\n");
    return `${sectionHeader}\n${filesContent}`;
  }).filter(Boolean);
  if(sections.length===0) return "";
  let assembled=`\n\n=== USER-PROVIDED CONTEXT (use this as primary source of truth for brand voice, product details, audience, and current campaigns) ===\n\n${sections.join("\n\n")}\n\n=== END USER CONTEXT ===\n`;
  // Hard cap as a safety net (in case many small files exceed budget collectively)
  if(assembled.length>MAX_CONTEXT_CHARS+400){assembled=assembled.slice(0,MAX_CONTEXT_CHARS)+"\n…[context truncated to fit request budget]\n=== END USER CONTEXT ===\n";}
  return assembled;
};

// ─── Brand Assets Panel ──────────────────────────────────────────────────────
const BrandAssetsPanel=({brandAssets,show,onToggle,hideClose})=>{
  const{assets,loading,error,addAsset,updateDescription,removeAsset}=brandAssets;
  const fileRef=useRef(null);
  const[uploading,setUploading]=useState(false);
  const[opError,setOpError]=useState("");
  const handleFileUpload=async(e)=>{
    const file=e.target.files?.[0];e.target.value="";
    if(!file)return;
    setUploading(true);setOpError("");
    try{await addAsset(file,"");}
    catch(ex){setOpError(ex.message||"Upload failed");}
    finally{setUploading(false);}
  };
  const handleRemove=async(id)=>{
    try{await removeAsset(id);}
    catch(ex){setOpError(ex.message||"Remove failed");}
  };
  // Debounced description updates so typing doesn't fire one Supabase call per keystroke
  const descTimersRef=useRef({});
  const handleDescChange=(id,desc)=>{
    if(descTimersRef.current[id])clearTimeout(descTimersRef.current[id]);
    descTimersRef.current[id]=setTimeout(()=>{updateDescription(id,desc).catch(ex=>setOpError(ex.message||"Save description failed"));},500);
  };

  if(!show) return null;
  return (<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 22px",marginBottom:24,animation:"fadeIn 0.3s ease-out"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em"}}>Brand Assets</div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>!uploading&&fileRef.current?.click()} disabled={uploading} style={{fontSize:11,fontFamily:font,color:C.bg,background:C.accent,border:"none",borderRadius:6,padding:"5px 14px",cursor:uploading?"wait":"pointer",fontWeight:600,opacity:uploading?0.6:1}}>{uploading?"Uploading...":"+ Upload"}</button>
        {!hideClose&&<button onClick={onToggle} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:14}}>✕</button>}
      </div>
    </div>
    <input ref={fileRef} type="file" accept="image/*" onChange={handleFileUpload} style={{display:"none"}}/>
    <div style={{fontSize:11,color:C.dim,marginBottom:14,lineHeight:1.5}}>Upload logos, brand marks, color palettes, and style references. These inform AI artwork generation.</div>
    {error&&<div style={{padding:"10px 12px",marginBottom:12,fontSize:11,color:C.red,background:C.redSoft,border:"1px solid rgba(248,113,113,0.2)",borderRadius:6}}>Load error: {error}</div>}
    {opError&&<div style={{padding:"10px 12px",marginBottom:12,fontSize:11,color:C.red,background:C.redSoft,border:"1px solid rgba(248,113,113,0.2)",borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{opError}</span><button onClick={()=>setOpError("")} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14}}>✕</button></div>}
    {loading&&<div style={{padding:"20px",textAlign:"center",fontSize:12,color:C.muted,fontFamily:mono}}>Loading brand assets...</div>}
    {!loading&&assets.length===0&&<div style={{padding:"20px",textAlign:"center",border:`1px dashed ${C.border}`,borderRadius:8,color:C.dim,fontSize:12}}>No assets uploaded yet</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))",gap:10}}>
      {assets.map(a=> (<div key={a.id} style={{background:"rgba(200,205,211,0.03)",borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`}}>
        {a.displayUrl?<img src={a.displayUrl} alt={a.name} style={{width:"100%",height:80,objectFit:"cover",display:"block"}}/>:<div style={{width:"100%",height:80,background:"rgba(200,205,211,0.04)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:C.dim}}>preview unavailable</div>}
        <div style={{padding:"8px"}}>
          <input defaultValue={a.description} onChange={e=>handleDescChange(a.id,e.target.value)} placeholder="Describe this asset..."
            style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.border}`,fontSize:10,fontFamily:font,color:C.text,outline:"none",padding:"2px 0",marginBottom:4,boxSizing:"border-box"}}/>
          <button onClick={()=>handleRemove(a.id)} style={{fontSize:9,color:C.red,background:"none",border:"none",cursor:"pointer"}}>Remove</button>
        </div>
      </div>))}
    </div>
  </div>);
};

// ─── Content Calendar (Enhanced with Preview) ────────────────────────────────
const ContentCalendar=({history,onUpdateEntry,onDeleteEntry,onUploadImage})=>{
  const[view,setView]=useState("week");
  const[preview,setPreview]=useState(null);
  const today=new Date();const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const days=[];
  if(view==="week"){
    // Show today + next 6 days (rolling week) — aligns with content scheduling needs
    for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()+i);days.push(d);}
  }
  else{const first=new Date(today.getFullYear(),today.getMonth(),1);const last=new Date(today.getFullYear(),today.getMonth()+1,0);
    for(let i=0;i<first.getDay();i++)days.push(null);
    for(let i=1;i<=last.getDate();i++)days.push(new Date(today.getFullYear(),today.getMonth(),i));}
  const totalP=history.filter(h=>h.type==="post").length;const totalT=history.filter(h=>h.type==="thread").length;const totalA=history.filter(h=>h.type==="article").length;
  const cycleStatus=(entry)=>{const order=["draft","scheduled","published"];const next=order[(order.indexOf(entry.status||"draft")+1)%3];onUpdateEntry({...entry,status:next});};

  return (<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 22px",marginBottom:24}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em"}}>{view==="week"?"Next 7 Days":`${monthNames[today.getMonth()]} ${today.getFullYear()}`}</div>
      <div style={{display:"flex",gap:4}}>{["week","month"].map(v=> <button key={v} onClick={()=>setView(v)} style={{padding:"5px 14px",fontSize:11,fontFamily:font,fontWeight:view===v?600:400,color:view===v?C.bg:C.muted,background:view===v?C.accent:"rgba(200,205,211,0.04)",border:view===v?"none":`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",textTransform:"capitalize"}}>{v}</button>)}</div>
    </div>
    {history.length>0&&<div style={{marginBottom:16}}>
      <div style={{display:"flex",height:6,borderRadius:3,overflow:"hidden",gap:2,marginBottom:8}}>
        {totalP>0&&<div style={{flex:totalP,background:C.accent,borderRadius:3}}/>}{totalT>0&&<div style={{flex:totalT,background:C.blue,borderRadius:3}}/>}{totalA>0&&<div style={{flex:totalA,background:C.purple,borderRadius:3}}/>}
      </div>
      <div style={{display:"flex",gap:16,fontSize:10,color:C.muted,fontFamily:mono}}><span><Dot color={C.accent}/>{totalP} posts</span><span><Dot color={C.blue}/>{totalT} threads</span><span><Dot color={C.purple}/>{totalA} articles</span></div>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
      {view==="week"
        ? days.map((d,i)=> <div key={i} style={{textAlign:"center",fontSize:9,color:C.dim,fontFamily:mono,padding:2}}>{dayNames[d.getDay()]}</div>)
        : dayNames.map(d=> <div key={d} style={{textAlign:"center",fontSize:9,color:C.dim,fontFamily:mono,padding:2}}>{d}</div>)
      }
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
      {days.map((d,i)=>{if(!d) return <div key={`e-${i}`}/>;const key=ymd(d);const items=history.filter(h=>h.date===key);const isToday=key===ymd(today);
        return (<div key={key} onClick={()=>items.length>0&&setPreview(preview===key?null:key)} style={{textAlign:"center",padding:view==="week"?"12px 4px":"8px 4px",borderRadius:8,cursor:items.length?"pointer":"default",background:isToday?"rgba(217,170,90,0.06)":"transparent",border:isToday?`1px solid ${C.accentSoft}`:`1px solid transparent`,transition:"all 0.15s",minHeight:view==="week"?70:40}}>
          <div style={{fontSize:view==="week"?14:12,fontWeight:600,color:isToday?C.accent:C.muted,fontFamily:mono}}>{d.getDate()}</div>
          <div style={{display:"flex",justifyContent:"center",gap:3,marginTop:4,flexWrap:"wrap"}}>{items.map((it,j)=> <div key={j} style={{width:8,height:8,borderRadius:"50%",background:TYPE_COLORS[it.type],border:it.status==="published"?`2px solid ${C.green}`:it.status==="scheduled"?`2px solid ${C.accent}`:"2px solid transparent",boxSizing:"border-box"}}/>)}</div>
        </div>);})}
    </div>

const CalendarImageUpload=({entry,onUpdateEntry,onUploadImage})=>{
  const ref=useRef(null);
  const[uploading,setUploading]=useState(false);
  const[err,setErr]=useState("");
  const handle=async(e)=>{
    const f=e.target.files?.[0];e.target.value="";
    if(!f||!onUploadImage)return;
    setUploading(true);setErr("");
    try{
      const{path,signedUrl}=await onUploadImage(f);
      onUpdateEntry({...entry,image:signedUrl,imagePath:path});
    }catch(ex){setErr(ex.message||"Upload failed");}
    finally{setUploading(false);}
  };
  return (<>
    <button onClick={()=>!uploading&&ref.current?.click()} disabled={uploading} style={{marginTop:12,width:"100%",padding:"10px",fontSize:11,fontFamily:font,color:C.muted,background:"rgba(200,205,211,0.03)",border:`1px dashed ${C.border}`,borderRadius:8,cursor:uploading?"wait":"pointer",opacity:uploading?0.6:1}}>{uploading?"Uploading...":"📁 Add image to this post"}</button>
    <input ref={ref} type="file" accept="image/*" onChange={handle} style={{display:"none"}}/>
    {err&&<div style={{marginTop:6,fontSize:10,color:C.red}}>{err}</div>}
  </>);
};

const CARD_TEMPLATES=[{id:"quote",label:"Quote Card"},{id:"stat",label:"Stat Highlight"},{id:"announce",label:"Announcement"}];

const BrandCard=({text,template="quote"})=>{
  const canvasRef=useRef(null);const width=1200,height=675;
  const drawCard=useCallback(()=>{
    const canvas=canvasRef.current;if(!canvas)return;const ctx2d=canvas.getContext("2d");
    ctx2d.fillStyle="#0B0E11";ctx2d.fillRect(0,0,width,height);
    ctx2d.fillStyle="#D9AA5A";
    if(template==="quote")ctx2d.fillRect(60,60,4,height-120);
    else if(template==="stat")ctx2d.fillRect(0,height-8,width,8);
    else ctx2d.fillRect(60,60,width-120,4);
    ctx2d.fillStyle="#D9AA5A";ctx2d.font="bold 18px 'DM Sans', sans-serif";
    ctx2d.fillText("HONOROLL",template==="quote"?84:60,template==="announce"?100:height-40);
    ctx2d.fillStyle="#E8ECEF";const fontSize=text.length>200?24:text.length>100?30:38;
    ctx2d.font=`600 ${fontSize}px 'DM Sans', sans-serif`;
    const maxWidth=width-160;const lineHeight=fontSize*1.5;const words=text.split(" ");let line="";let y=template==="announce"?160:160;
    for(const word of words){const test=line+word+" ";if(ctx2d.measureText(test).width>maxWidth&&line){ctx2d.fillText(line.trim(),template==="quote"?84:80,y);y+=lineHeight;line=word+" ";}else{line=test;}}
    ctx2d.fillText(line.trim(),template==="quote"?84:80,y);
  },[text,template]);
  useEffect(()=>{drawCard();},[drawCard]);
  const download=()=>{const c=canvasRef.current;if(!c)return;const a=document.createElement("a");a.download=`honoroll-${template}.png`;a.href=c.toDataURL("image/png");a.click();};
  return (<div><canvas ref={canvasRef} width={width} height={height} style={{width:"100%",height:"auto",aspectRatio:"16/9",borderRadius:8,border:`1px solid ${C.border}`,display:"block"}}/><div style={{display:"flex",gap:8,marginTop:8,justifyContent:"flex-end"}}><button onClick={download} style={{fontSize:11,fontFamily:mono,color:C.green,background:"none",border:`1px solid ${C.greenBdr}`,borderRadius:6,padding:"5px 14px",cursor:"pointer"}}>Download PNG</button></div></div>);
};

const AIArtwork=({text,brandAssets})=>{
  const[svgCode,setSvgCode]=useState(null);const[loading,setLoading]=useState(false);const[error,setError]=useState("");
  const[customPrompt,setCustomPrompt]=useState("");
  const brandContext=brandAssets?.length?`\nBRAND ASSETS CONTEXT: ${brandAssets.map(a=>`${a.name}: ${a.description||"no description"}`).join("; ")}. Use these descriptions to inform the visual style and themes.`:"";
  const generate=async()=>{
    setLoading(true);setError("");
    try{
      const userPrompt=customPrompt?`Post text: ${text}\n\nAdditional image direction: ${customPrompt}${brandContext}`:`Post text: ${text}${brandContext}`;
      const result=await callLLM(
        `You generate SVG artwork for social media posts. Create a visually striking abstract SVG image that complements the given post text.
CRITICAL DIMENSIONS: viewBox="0 0 1200 675" width="1200" height="675". 16:9 aspect ratio.
Rules:
- Dark background: fill entire area with #0B0E11
- Primary: #D9AA5A (amber/gold), secondary: #5AB8D9 (blue), subtle: #D95A8C (pink)
- Modern, minimal, abstract. Geometric shapes, gradients, flowing lines
- NO text, NO letters, NO words, NO logos
- NO clipPath, NO mask, NO filter, NO foreignObject
- Use only: rect, circle, ellipse, line, polyline, polygon, path, linearGradient, radialGradient, defs, g, stop
- Output ONLY raw SVG starting with <svg. No markdown, no backticks.
- Start with: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">`,
        userPrompt,2048);
      const clean=result.replace(/```svg|```xml|```/g,"").trim();
      if(!clean.startsWith("<svg")) throw new Error("Invalid SVG");
      setSvgCode(clean);setLoading(false);
    }catch(e){setError(e.message);setLoading(false);}
  };
  const downloadSvg=()=>{if(!svgCode)return;const b=new Blob([svgCode],{type:"image/svg+xml"});const a=document.createElement("a");a.download=`honoroll-art.svg`;a.href=URL.createObjectURL(b);a.click();};
  const download=()=>{if(!svgCode)return;const b=new Blob([svgCode],{type:"image/svg+xml;charset=utf-8"});const url=URL.createObjectURL(b);const img=new window.Image();img.onload=()=>{const c=document.createElement("canvas");c.width=1200;c.height=675;c.getContext("2d").drawImage(img,0,0);URL.revokeObjectURL(url);const a=document.createElement("a");a.download="honoroll-art.png";a.href=c.toDataURL("image/png");a.click();};img.src=url;};
  return (<div>
    <div style={{marginBottom:10}}><textarea value={customPrompt} onChange={e=>setCustomPrompt(e.target.value)} placeholder="Optional: describe what you want in the image (e.g., 'golden dice on dark background', 'abstract network connections')..."
      style={{width:"100%",background:"rgba(200,205,211,0.04)",border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",fontSize:12,fontFamily:font,color:C.text,outline:"none",resize:"none",minHeight:36,boxSizing:"border-box"}}/>
    </div>
    {!svgCode&&!loading&&!error&&<button onClick={generate} style={{width:"100%",padding:"14px",fontSize:12,fontFamily:font,fontWeight:500,color:C.muted,background:"rgba(200,205,211,0.03)",border:`1px dashed ${C.border}`,borderRadius:8,cursor:"pointer"}}>✦ Generate Artwork</button>}
    {loading&&<div style={{padding:"24px",textAlign:"center",background:"rgba(200,205,211,0.03)",borderRadius:8,border:`1px solid ${C.border}`}}><div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:10}}>{[0,1,2].map(i=> <div key={i} style={{width:6,height:6,borderRadius:"50%",background:C.purple,animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>)}</div><div style={{fontSize:12,color:C.muted}}>Creating artwork...</div></div>}
    {error&&<div style={{fontSize:11,color:C.red,padding:"8px 12px",background:C.redSoft,borderRadius:6,marginBottom:8}}>{error} <button onClick={generate} style={{color:C.red,background:"none",border:"none",cursor:"pointer",textDecoration:"underline",fontSize:11}}>Retry</button></div>}
    {svgCode&&<div><div style={{borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`,background:"#0B0E11",aspectRatio:"16/9",width:"100%",position:"relative"}}><div style={{position:"absolute",inset:0}} dangerouslySetInnerHTML={{__html:sanitizeSvg(svgCode.replace(/<svg /,'<svg style="width:100%;height:100%;display:block" '))}}/></div>
      <div style={{display:"flex",gap:8,marginTop:8,justifyContent:"flex-end"}}><button onClick={()=>{setSvgCode(null);generate();}} style={{fontSize:11,fontFamily:mono,color:C.muted,background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 14px",cursor:"pointer"}}>Regenerate</button><button onClick={downloadSvg} style={{fontSize:11,fontFamily:mono,color:C.blue,background:"none",border:`1px solid rgba(90,184,217,0.3)`,borderRadius:6,padding:"5px 14px",cursor:"pointer"}}>SVG</button><button onClick={download} style={{fontSize:11,fontFamily:mono,color:C.green,background:"none",border:`1px solid ${C.greenBdr}`,borderRadius:6,padding:"5px 14px",cursor:"pointer"}}>PNG</button></div>
    </div>}
  </div>);
};

// ─── Article Card (editable) ─────────────────────────────────────────────────
const ArticleCard=({article,onUpdateBody,onUpdateHeadline,onSchedule,scheduledDate})=>{
  const[editBody,setEditBody]=useState(false);const[bodyDraft,setBodyDraft]=useState(article.body||"");
  const bodyRef=useRef(null);
  const saveBody=()=>{onUpdateBody(bodyDraft);setEditBody(false);};
  const insertEmojiBody=(emoji)=>{
    const ta=bodyRef.current;if(!ta){setBodyDraft(bodyDraft+emoji);return;}
    const start=ta.selectionStart;const end=ta.selectionEnd;
    const newText=bodyDraft.slice(0,start)+emoji+bodyDraft.slice(end);
    setBodyDraft(newText);
    setTimeout(()=>{ta.focus();ta.setSelectionRange(start+emoji.length,start+emoji.length);ta.style.height="auto";ta.style.height=ta.scrollHeight+"px";},0);
  };
  return (<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"24px 28px",marginBottom:40,animation:"fadeIn 0.4s ease-out"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><DraftBadge/>{article.wordCount&&<span style={{fontSize:11,fontFamily:mono,color:C.dim}}>~{article.wordCount} words</span>}</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}><ScheduleBtn onSchedule={onSchedule} scheduledDate={scheduledDate}/><button onClick={()=>{if(editBody){saveBody();}else{setBodyDraft(article.body||"");setEditBody(true);}}} style={{fontSize:11,fontFamily:mono,color:editBody?C.accent:C.muted,background:"none",border:`1px solid ${editBody?C.accent:C.border}`,borderRadius:6,padding:"4px 12px",cursor:"pointer"}}>{editBody?"Save":"Edit"}</button><CopyBtn text={`${article.headline}\n\n${article.body}`}/></div>
    </div>

    :<div style={{fontSize:14,color:C.text,lineHeight:1.75}}>{article.body?.split("\n").map((line,i)=>{if(line.startsWith("## ")) return <h3 key={i} style={{fontSize:16,fontWeight:700,color:C.bright,marginTop:24,marginBottom:8,fontFamily:font}}>{line.replace("## ","")}</h3>;if(line.startsWith("### ")) return <h4 key={i} style={{fontSize:14,fontWeight:600,color:C.bright,marginTop:20,marginBottom:6,fontFamily:font}}>{line.replace("### ","")}</h4>;if(line.trim()==="") return <div key={i} style={{height:12}}/>;const parts=line.split(/(\*\*.*?\*\*)/g);return <p key={i} style={{marginBottom:8}}>{parts.map((part,j)=>part.startsWith("**")&&part.endsWith("**")?<strong key={j} style={{color:C.bright,fontWeight:600}}>{part.slice(2,-2)}</strong>:part)}</p>;})}</div>}

// ─── Content Page ────────────────────────────────────────────────────────────
const ContentPage=({analyticsData,contentState,setContentState,contextFiles,defaults,onUpdateDefaults,calendarEntries})=>{
  const ctx=buildMarketingContext(analyticsData);
  const[tone,setTone]=useState(contentState.tone||defaults?.tone||"founder");
  // Topic ("what to write about") is persisted in user_settings.content_topic
  // and edited locally with a debounced upsert. Local mirror keeps typing snappy.
  const[topic,setTopic]=useState(defaults?.contentTopic||"");
  useEffect(()=>{if(typeof defaults?.contentTopic==="string"&&defaults.contentTopic!==topic){setTopic(defaults.contentTopic);}// eslint-disable-next-line
  },[defaults?.contentTopic]);
  const topicTimerRef=useRef(null);
  const updateTopic=(next)=>{
    setTopic(next);
    if(topicTimerRef.current)clearTimeout(topicTimerRef.current);
    topicTimerRef.current=setTimeout(()=>{if(onUpdateDefaults)onUpdateDefaults({contentTopic:next});},500);
  };
  const{posts,thread,article}=contentState;
  const{entries:calendar,loading:calendarLoading,error:calendarError,addEntry,scheduleEntry,updateEntry,deleteEntry,uploadCalendarImage}=calendarEntries;
  const setPosts=(p)=>setContentState(s=>({...s,posts:p}));
  const setThread=(t)=>setContentState(s=>({...s,thread:t}));
  const setArticle=(a)=>setContentState(s=>({...s,article:a}));
  // Calendar operations now hit Supabase (async, fire-and-forget for snappy UI)
  const addCalendar=(type,preview,fullText)=>{
    addEntry({type,preview,fullText,imagePath:null,date:ymd(new Date()),status:"draft"}).catch(e=>debugLog("addCalendar failed",e));
  };
  const scheduleToDate=(type,preview,fullText,date)=>{
    scheduleEntry({type,preview,fullText,date,imagePath:null}).catch(e=>debugLog("scheduleToDate failed",e));
  };
  const findScheduledDate=(type,fullText)=>{
    const entry=calendar.find(e=>e.status==="scheduled"&&e.type===type&&e.fullText===fullText);
    return entry?.date||null;
  };
  const updateCalendarEntry=(updated)=>{updateEntry(updated).catch(e=>debugLog("updateCalendarEntry failed",e));};
  const deleteCalendarEntry=(id)=>{deleteEntry(id).catch(e=>debugLog("deleteCalendarEntry failed",e));};
  const updatePost=(idx,newText)=>{const updated=[...posts];updated[idx]={...updated[idx],text:newText,chars:newText.length};setPosts(updated);};
  const updateThreadTweet=(idx,newText)=>{const updated=[...thread];updated[idx]={...updated[idx],tweet:newText,chars:newText.length};setThread(updated);};

// Auto-format: lowercase, replace spaces with underscores, strip special chars
const formatUtm=(s)=>(s||"").toLowerCase().trim().replace(/\s+/g,"_").replace(/[^a-z0-9_-]/g,"");

const buildUtmUrl=(base,source,medium,campaign)=>{
  if(!base) return "";
  try{
    const url=new URL(base.includes("://")?base:`https://${base}`);
    if(source) url.searchParams.set("utm_source",source);
    if(medium) url.searchParams.set("utm_medium",medium);
    if(campaign) url.searchParams.set("utm_campaign",campaign);
    return url.toString();
  }catch(e){
    // Invalid URL, build manually
    const params=[];
    if(source) params.push(`utm_source=${encodeURIComponent(source)}`);
    if(medium) params.push(`utm_medium=${encodeURIComponent(medium)}`);
    if(campaign) params.push(`utm_campaign=${encodeURIComponent(campaign)}`);
    return params.length?`${base}${base.includes("?")?"&":"?"}${params.join("&")}`:base;
  }
};

const UtmPage=({utmLinks})=>{
  const{links:utmHistory,loading,error,addLink,deleteLink}=utmLinks;
  const[destUrl,setDestUrl]=useState("");
  const[source,setSource]=useState("");
  const[medium,setMedium]=useState("");
  const[campaign,setCampaign]=useState("");
  const[customLabel,setCustomLabel]=useState("");
  const[justSaved,setJustSaved]=useState(false);
  const[search,setSearch]=useState("");
  const[filterSource,setFilterSource]=useState("");
  const[saving,setSaving]=useState(false);
  const[opError,setOpError]=useState("");

  const liveUrl=buildUtmUrl(destUrl,source,medium,campaign);
  const isComplete=destUrl&&source&&medium&&campaign;

  const applyTemplate=(tpl)=>{setSource(tpl.source);setMedium(tpl.medium);};

  const save=async()=>{
    if(!isComplete||saving) return;
    setSaving(true);setOpError("");
    const autoLabel=`${source} / ${medium} / ${campaign}`;
    try{
      await addLink({destUrl,source,medium,campaign,label:customLabel||autoLabel,fullUrl:liveUrl});
      // Copy to clipboard
      try{
        if(navigator.clipboard?.writeText) navigator.clipboard.writeText(liveUrl);
        else{const ta=document.createElement("textarea");ta.value=liveUrl;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
      }catch(e){}
      setJustSaved(true);
      setTimeout(()=>{setDestUrl("");setSource("");setMedium("");setCampaign("");setCustomLabel("");setJustSaved(false);},1500);
    }catch(e){setOpError(e.message||"Failed to save");}
    finally{setSaving(false);}
  };

  const deleteEntry=async(id)=>{try{await deleteLink(id);}catch(e){setOpError(e.message||"Failed to delete");}};

  const filtered=utmHistory.filter(h=>{

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:16}}>

          <div>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Medium <span style={{color:C.red}}>*</span> <span style={{textTransform:"none",fontWeight:400,color:C.dim,fontSize:10}}>type of channel</span></label>
            <SourceMediumPicker value={medium} onChange={setMedium} options={UTM_MEDIUMS} placeholder="Select medium..."/>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Campaign <span style={{color:C.red}}>*</span> <span style={{textTransform:"none",fontWeight:400,color:C.dim,fontSize:10}}>what it's for</span></label>
            <input value={campaign} onChange={e=>setCampaign(formatUtm(e.target.value))} placeholder="closed_beta_launch"

        <div>

      </div>
      {opError&&<div style={{padding:`${S.md-2}px ${S.lg-2}px`,marginBottom:S.lg,fontSize:T.caption,color:C.red,background:C.redSoft,border:`1px solid ${C.redBdr}`,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>{opError}</span><button onClick={()=>setOpError("")} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:T.body}}>✕</button></div>}
      {error&&<div style={{padding:`${S.md}px ${S.lg-2}px`,marginBottom:S.lg,fontSize:T.caption,color:C.red,background:C.redSoft,border:`1px solid ${C.redBdr}`,borderRadius:8}}>Load error: {error}</div>}

        <div style={{fontSize:T.caption,color:C.dim}}>Build your first UTM link above</div>
      </div>)
      :filtered.length===0?(<div style={{background:C.surfaceInset,border:`1px dashed ${C.border}`,borderRadius:12,padding:S.xl,textAlign:"center",fontSize:T.body,color:C.muted}}>No links match your filters</div>)

      }
    </SectionCard>

    {/* Footer */}
    <div style={{textAlign:"center",padding:`${S.xxl}px 0 ${S.lg}px`,borderTop:`1px solid ${C.border}`,fontSize:T.caption,color:C.faint,fontFamily:mono,marginTop:S.xxl}}>Honoroll Dashboard v1.0</div>
