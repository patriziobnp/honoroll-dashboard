// ─── Data: useContextFiles hook (Supabase) ──────────────────────────────────
// Maps Supabase row (snake_case) to React shape (camelCase) used everywhere else
const rowToContextFile=(r)=>({id:r.id,category:r.category,label:r.label,content:r.content,active:r.active,wordCount:r.word_count,createdAt:r.created_at?new Date(r.created_at).getTime():Date.now()});

const useContextFiles=(user)=>{
  const[files,setFiles]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState("");

  // Initial load on user change
  useEffect(()=>{
    if(!user){setFiles([]);setLoading(false);return;}
    const sb=getSupabase();
    if(!sb){setError("Supabase not ready");setLoading(false);return;}
    let cancelled=false;
    (async()=>{
      setLoading(true);setError("");
      try{
        const{data,error:e}=await sb.from("context_files").select("*").order("created_at",{ascending:true});
        if(cancelled)return;
        if(e)throw e;
        setFiles((data||[]).map(rowToContextFile));
      }catch(e){if(!cancelled)setError(e.message||"Failed to load context files");}
      finally{if(!cancelled)setLoading(false);}
    })();
    return()=>{cancelled=true;};
  },[user?.id]);

  // Add a new file
  const addFile=async({category,label,content})=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const wordCount=countWords(content);
    const{data,error:e}=await sb.from("context_files").insert({user_id:user.id,category,label:label.trim(),content:content.trim(),active:true,word_count:wordCount}).select().single();
    if(e)throw e;
    setFiles(f=>[...f,rowToContextFile(data)]);
    return data;
  };

  // Toggle active flag
  const toggleActive=async(id)=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const cur=files.find(f=>f.id===id);if(!cur)return;
    const{data,error:e}=await sb.from("context_files").update({active:!cur.active}).eq("id",id).select().single();
    if(e)throw e;
    setFiles(f=>f.map(x=>x.id===id?rowToContextFile(data):x));
  };

  // Update file content
  const updateContent=async(id,content)=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const wordCount=countWords(content);
    const{data,error:e}=await sb.from("context_files").update({content:content.trim(),word_count:wordCount}).eq("id",id).select().single();
    if(e)throw e;
    setFiles(f=>f.map(x=>x.id===id?rowToContextFile(data):x));
  };

  // Delete file
  const deleteFile=async(id)=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const{error:e}=await sb.from("context_files").delete().eq("id",id);
    if(e)throw e;
    setFiles(f=>f.filter(x=>x.id!==id));
  };

  return {files,loading,error,addFile,toggleActive,updateContent,deleteFile};
};

// ─── Data: useUserSettings hook (Supabase) ────────────────────────────────────
// Single row per user (auto-created by trigger on signup). Uses upsert defensively.
const AI_MODELS=[
  {id:"llama-3.3-70b-versatile",label:"Llama 3.3 70B",tag:"Quality",icon:"◉",desc:"Higher quality output. Slower (~10-15s). Tight rate limit on Groq free tier — best for important pieces."},
  {id:"llama-3.1-8b-instant",label:"Llama 3.1 8B Instant",tag:"Speed",icon:"⚡",desc:"Faster (~2-4s), much higher rate limit. Best for high-volume drafting and quick iteration."},
];
const DEFAULT_AI_MODEL="llama-3.3-70b-versatile";
const DEFAULT_SITE_NAME="Honoroll";
const DEFAULT_SITE_DOMAIN="honoroll.io";
const DEFAULT_UMAMI_WEBSITE_ID="b383e359-7384-45e0-81b4-0a33ba905df3";
const DEFAULT_SETTINGS={tone:"founder",postLength:"normal",threadLength:"normal",articleLength:"normal",aiModel:DEFAULT_AI_MODEL,siteName:DEFAULT_SITE_NAME,siteDomain:DEFAULT_SITE_DOMAIN,umamiWebsiteId:DEFAULT_UMAMI_WEBSITE_ID,useMockData:false,contentTopic:""};
const rowToSettings=(r)=>({tone:r.tone||"founder",postLength:r.post_length||"normal",threadLength:r.thread_length||"normal",articleLength:r.article_length||"normal",aiModel:r.ai_model||DEFAULT_AI_MODEL,siteName:r.site_name||DEFAULT_SITE_NAME,siteDomain:r.site_domain||DEFAULT_SITE_DOMAIN,umamiWebsiteId:r.umami_website_id||DEFAULT_UMAMI_WEBSITE_ID,useMockData:!!r.use_mock_data,contentTopic:r.content_topic||""});
const settingsToRow=(s,userId)=>({user_id:userId,tone:s.tone,post_length:s.postLength,thread_length:s.threadLength,article_length:s.articleLength,ai_model:s.aiModel||DEFAULT_AI_MODEL,site_name:s.siteName||DEFAULT_SITE_NAME,site_domain:s.siteDomain||DEFAULT_SITE_DOMAIN,umami_website_id:s.umamiWebsiteId||DEFAULT_UMAMI_WEBSITE_ID,use_mock_data:!!s.useMockData,content_topic:s.contentTopic||""});

const useUserSettings=(user)=>{
  const[settings,setSettings]=useState(DEFAULT_SETTINGS);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState("");

  // Initial load
  useEffect(()=>{
    if(!user){setSettings(DEFAULT_SETTINGS);setLoading(false);return;}
    const sb=getSupabase();if(!sb){setError("Supabase not ready");setLoading(false);return;}
    let cancelled=false;
    (async()=>{
      setLoading(true);setError("");
      try{
        const{data,error:e}=await sb.from("user_settings").select("*").eq("user_id",user.id).maybeSingle();
        if(cancelled)return;
        if(e)throw e;
        if(data)setSettings(rowToSettings(data));
        // If no row (e.g. trigger didn't fire), settings stays at defaults; first update will upsert
      }catch(e){if(!cancelled)setError(e.message||"Failed to load settings");}
      finally{if(!cancelled)setLoading(false);}
    })();
    return()=>{cancelled=true;};
  },[user?.id]);

  // Optimistic update: change UI immediately, debounce upsert to avoid race conditions
  // when user clicks multiple settings in quick succession.
  const settingsRef=useRef(settings);
  useEffect(()=>{settingsRef.current=settings;},[settings]);
  const upsertTimerRef=useRef(null);
  // `saveState` lets the UI surface a "Saving / Saved" hint without callers
  // needing to track promises themselves. Cycles idle → saving → saved → idle.
  const[saveState,setSaveState]=useState("idle");
  const saveTimerRef=useRef(null);
  const updateSettings=(patch)=>{
    const next={...settingsRef.current,...patch};
    settingsRef.current=next;
    setSettings(next);
    setSaveState("saving");
    // Debounce the network call by 400ms - the last call within the window wins
    if(upsertTimerRef.current)clearTimeout(upsertTimerRef.current);
    upsertTimerRef.current=setTimeout(async()=>{
      const sb=getSupabase();if(!sb)return;
      try{
        const{error:e}=await sb.from("user_settings").upsert(settingsToRow(settingsRef.current,user.id),{onConflict:"user_id"});
        if(e)throw e;
        setSaveState("saved");
        if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
        saveTimerRef.current=setTimeout(()=>setSaveState("idle"),2000);
      }catch(e){setError(e.message||"Failed to save settings");setSaveState("idle");}
    },400);
  };

  return {settings,loading,error,updateSettings,saveState};
};

// ─── Data: useBrandAssets hook (Supabase + Storage) ──────────────────────────
// Brand assets store images in the `brand-assets` bucket (private). The DB row
// holds `storage_path`; signed URLs (1hr expiry) are generated for display.
const BRAND_ASSETS_BUCKET="brand-assets";
const CALENDAR_IMAGES_BUCKET="calendar-images";
const SIGNED_URL_EXPIRY_SEC=3600;

// Helper: given an array of {id, path} objects, return a map of id → signed URL
const batchSignedUrls=async(sb,bucket,items)=>{
  const validItems=items.filter(it=>it.path&&!it.path.startsWith("data:")&&!it.path.startsWith("http"));
  if(!validItems.length)return new Map();
  try{
    const{data,error}=await sb.storage.from(bucket).createSignedUrls(validItems.map(it=>it.path),SIGNED_URL_EXPIRY_SEC);
    if(error)throw error;
    const map=new Map();
    validItems.forEach((it,i)=>{const result=data?.[i];if(result&&result.signedUrl)map.set(it.id,result.signedUrl);});
    return map;
  }catch(e){debugLog("batchSignedUrls failed",e);return new Map();}
};

const rowToBrandAsset=(r,signedUrl)=>({
  id:r.id,
  name:r.name,
  description:r.description||"",
  storagePath:r.storage_path,
  displayUrl:signedUrl||null,
  createdAt:r.created_at?new Date(r.created_at).getTime():Date.now(),
});

const useBrandAssets=(user)=>{
  const[assets,setAssets]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState("");

  useEffect(()=>{
    if(!user){setAssets([]);setLoading(false);return;}
    const sb=getSupabase();if(!sb){setError("Supabase not ready");setLoading(false);return;}
    let cancelled=false;
    (async()=>{
      setLoading(true);setError("");
      try{
        const{data,error:e}=await sb.from("brand_assets").select("*").order("created_at",{ascending:true});
        if(cancelled)return;
        if(e)throw e;
        const rows=data||[];
        const urlMap=await batchSignedUrls(sb,BRAND_ASSETS_BUCKET,rows.map(r=>({id:r.id,path:r.storage_path})));
        if(cancelled)return;
        setAssets(rows.map(r=>rowToBrandAsset(r,urlMap.get(r.id))));
      }catch(e){if(!cancelled)setError(e.message||"Failed to load brand assets");}
      finally{if(!cancelled)setLoading(false);}
    })();
    return()=>{cancelled=true;};
  },[user?.id]);

  // Add: upload file to Storage, insert DB row, return entry with signed URL
  const addAsset=async(file,description="")=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    if(!file)throw new Error("No file");
    // Build a deterministic path scoped to user (matches RLS policy: first folder = user id)
    const ext=(file.name.split(".").pop()||"png").toLowerCase().replace(/[^a-z0-9]/g,"");
    const path=`${user.id}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
    const{error:uploadErr}=await sb.storage.from(BRAND_ASSETS_BUCKET).upload(path,file,{cacheControl:"3600",upsert:false,contentType:file.type||undefined});
    if(uploadErr)throw uploadErr;
    // Insert DB row
    const{data,error:e}=await sb.from("brand_assets").insert({user_id:user.id,name:file.name,description,storage_path:path}).select().single();
    if(e){
      // Best-effort cleanup of orphaned storage file
      try{await sb.storage.from(BRAND_ASSETS_BUCKET).remove([path]);}catch(_){}
      throw e;
    }
    // Generate signed URL for immediate display
    const{data:urlData}=await sb.storage.from(BRAND_ASSETS_BUCKET).createSignedUrl(path,SIGNED_URL_EXPIRY_SEC);
    const newAsset=rowToBrandAsset(data,urlData?.signedUrl);
    setAssets(a=>[...a,newAsset]);
    return newAsset;
  };

  const updateDescription=async(id,description)=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const{data,error:e}=await sb.from("brand_assets").update({description}).eq("id",id).select().single();
    if(e)throw e;
    setAssets(a=>a.map(x=>x.id===id?{...x,description:data.description||""}:x));
  };

  const removeAsset=async(id)=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const asset=assets.find(a=>a.id===id);
    // Remove from Storage first (best-effort)
    if(asset?.storagePath){try{await sb.storage.from(BRAND_ASSETS_BUCKET).remove([asset.storagePath]);}catch(_){}}
    const{error:e}=await sb.from("brand_assets").delete().eq("id",id);
    if(e)throw e;
    setAssets(a=>a.filter(x=>x.id!==id));
  };

  return {assets,loading,error,addAsset,updateDescription,removeAsset};
};

// ─── Data: useCalendarEntries hook (Supabase + Storage for images) ───────────
// rowToCalendarEntry returns an entry with `image` (display URL) and `imagePath` (storage path).
// For legacy data URLs (stored before Phase 6), `image` equals `imagePath` since the data URL is the display.
// For Storage paths, `image` is set from a signed URL fetched separately; `imagePath` is the storage path.
const rowToCalendarEntry=(r,signedUrl)=>{
  const raw=r.image_path||null;
  const isLegacyDataUrl=raw&&(raw.startsWith("data:")||raw.startsWith("http"));
  return {
    id:r.id,
    type:r.type,
    preview:r.preview,
    fullText:r.full_text,
    image:isLegacyDataUrl?raw:(signedUrl||null),
    imagePath:raw,
    date:r.date,
    status:r.status,
    createdAt:r.created_at?new Date(r.created_at).getTime():Date.now(),
  };
};

const useCalendarEntries=(user)=>{
  const[entries,setEntries]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState("");

  // Initial load — fetch entries, then batch signed URLs for those with storage paths
  useEffect(()=>{
    if(!user){setEntries([]);setLoading(false);return;}
    const sb=getSupabase();if(!sb){setError("Supabase not ready");setLoading(false);return;}
    let cancelled=false;
    (async()=>{
      setLoading(true);setError("");
      try{
        const{data,error:e}=await sb.from("calendar_entries").select("*").order("created_at",{ascending:true});
        if(cancelled)return;
        if(e)throw e;
        const rows=data||[];
        const urlMap=await batchSignedUrls(sb,CALENDAR_IMAGES_BUCKET,rows.map(r=>({id:r.id,path:r.image_path})));
        if(cancelled)return;
        setEntries(rows.map(r=>rowToCalendarEntry(r,urlMap.get(r.id))));
      }catch(e){if(!cancelled)setError(e.message||"Failed to load calendar entries");}
      finally{if(!cancelled)setLoading(false);}
    })();
    return()=>{cancelled=true;};
  },[user?.id]);

  // Upload an image to the calendar-images bucket. Returns {path, signedUrl}.
  const uploadCalendarImage=async(file)=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    if(!file)throw new Error("No file");
    const ext=(file.name.split(".").pop()||"png").toLowerCase().replace(/[^a-z0-9]/g,"");
    const path=`${user.id}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
    const{error:uploadErr}=await sb.storage.from(CALENDAR_IMAGES_BUCKET).upload(path,file,{cacheControl:"3600",upsert:false,contentType:file.type||undefined});
    if(uploadErr)throw uploadErr;
    const{data:urlData}=await sb.storage.from(CALENDAR_IMAGES_BUCKET).createSignedUrl(path,SIGNED_URL_EXPIRY_SEC);
    return {path,signedUrl:urlData?.signedUrl};
  };

  // Delete a storage image (best-effort). Used when removing an image or deleting an entry.
  const deleteCalendarImage=async(path)=>{
    if(!path||path.startsWith("data:")||path.startsWith("http"))return;
    const sb=getSupabase();if(!sb)return;
    try{await sb.storage.from(CALENDAR_IMAGES_BUCKET).remove([path]);}catch(e){debugLog("storage cleanup failed",e);}
  };

  // Add a new entry (draft or scheduled). Returns the new entry (with real id).
  // Helper: fetch a fresh signed URL for a storage path (used after insert/update so the UI sees the new image)
  const getSignedUrlForPath=async(path)=>{
    if(!path||path.startsWith("data:")||path.startsWith("http"))return null;
    const sb=getSupabase();if(!sb)return null;
    try{const{data}=await sb.storage.from(CALENDAR_IMAGES_BUCKET).createSignedUrl(path,SIGNED_URL_EXPIRY_SEC);return data?.signedUrl||null;}catch(e){return null;}
  };

  // Add a new entry. `imagePath` is a Storage path (or null). Caller should have uploaded the image first.
  const addEntry=async({type,preview,fullText,imagePath,date,status})=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const{data,error:e}=await sb.from("calendar_entries").insert({
      user_id:user.id,
      type,
      preview:(preview||"").slice(0,60),
      full_text:fullText||preview||"",
      image_path:imagePath||null,
      date:date||null,
      status:status||"draft",
    }).select().single();
    if(e)throw e;
    const signedUrl=await getSignedUrlForPath(data.image_path);
    const entry=rowToCalendarEntry(data,signedUrl);
    setEntries(es=>[...es,entry]);
    return entry;
  };

  // Schedule: delete any existing scheduled entry of same type+text, then insert new on given date.
  // Also clean up storage images for the deleted entries.
  const scheduleEntry=async({type,preview,fullText,date,imagePath})=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const matches=entries.filter(e=>e.status==="scheduled"&&e.type===type&&(e.fullText===fullText||e.preview===(preview||"").slice(0,60)));
    if(matches.length){
      const ids=matches.map(m=>m.id);
      const{error:delErr}=await sb.from("calendar_entries").delete().in("id",ids);
      if(delErr)throw delErr;
      // Best-effort: clean up storage images of deleted entries (but not the one we're keeping)
      matches.forEach(m=>{if(m.imagePath&&m.imagePath!==imagePath)deleteCalendarImage(m.imagePath);});
    }
    const{data,error:e}=await sb.from("calendar_entries").insert({
      user_id:user.id,
      type,
      preview:(preview||"").slice(0,60),
      full_text:fullText||preview||"",
      image_path:imagePath||null,
      date,
      status:"scheduled",
    }).select().single();
    if(e)throw e;
    const signedUrl=await getSignedUrlForPath(data.image_path);
    const newEntry=rowToCalendarEntry(data,signedUrl);
    setEntries(es=>[...es.filter(x=>!matches.find(m=>m.id===x.id)),newEntry]);
    return newEntry;
  };

  // Update an entry. Caller passes the full updated entry shape. If imagePath changed, clean up old storage object.
  const updateEntry=async(updated)=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const prev=entries.find(x=>x.id===updated.id);
    const{data,error:e}=await sb.from("calendar_entries").update({
      type:updated.type,
      preview:(updated.preview||"").slice(0,60),
      full_text:updated.fullText,
      image_path:updated.imagePath||null,
      date:updated.date,
      status:updated.status,
    }).eq("id",updated.id).select().single();
    if(e)throw e;
    // If imagePath changed and old one was a Storage path, clean it up
    if(prev&&prev.imagePath&&prev.imagePath!==data.image_path)deleteCalendarImage(prev.imagePath);
    const signedUrl=await getSignedUrlForPath(data.image_path);
    const fresh=rowToCalendarEntry(data,signedUrl);
    setEntries(es=>es.map(x=>x.id===fresh.id?fresh:x));
    return fresh;
  };

  // Delete by id; also clean up storage image
  const deleteEntry=async(id)=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const entry=entries.find(x=>x.id===id);
    const{error:e}=await sb.from("calendar_entries").delete().eq("id",id);
    if(e)throw e;
    if(entry?.imagePath)deleteCalendarImage(entry.imagePath);
    setEntries(es=>es.filter(x=>x.id!==id));
  };

  return {entries,loading,error,addEntry,scheduleEntry,updateEntry,deleteEntry,uploadCalendarImage};
};

// ─── Data: useUtmLinks hook (Supabase) ───────────────────────────────────────
const rowToUtmLink=(r)=>({id:r.id,url:r.full_url,destUrl:r.dest_url,source:r.source,medium:r.medium,campaign:r.campaign,label:r.label,createdAt:r.created_at?new Date(r.created_at).getTime():Date.now()});

const useUtmLinks=(user)=>{
  const[links,setLinks]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState("");

  useEffect(()=>{
    if(!user){setLinks([]);setLoading(false);return;}
    const sb=getSupabase();if(!sb){setError("Supabase not ready");setLoading(false);return;}
    let cancelled=false;
    (async()=>{
      setLoading(true);setError("");
      try{
        const{data,error:e}=await sb.from("utm_links").select("*").order("created_at",{ascending:false});
        if(cancelled)return;
        if(e)throw e;
        setLinks((data||[]).map(rowToUtmLink));
      }catch(e){if(!cancelled)setError(e.message||"Failed to load UTM links");}
      finally{if(!cancelled)setLoading(false);}
    })();
    return()=>{cancelled=true;};
  },[user?.id]);

  const addLink=async({destUrl,source,medium,campaign,label,fullUrl})=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const{data,error:e}=await sb.from("utm_links").insert({user_id:user.id,label,source,medium,campaign,dest_url:destUrl,full_url:fullUrl}).select().single();
    if(e)throw e;
    setLinks(l=>[rowToUtmLink(data),...l]);
    return data;
  };

  const deleteLink=async(id)=>{
    const sb=getSupabase();if(!sb)throw new Error("Supabase not ready");
    const{error:e}=await sb.from("utm_links").delete().eq("id",id);
    if(e)throw e;
    setLinks(l=>l.filter(x=>x.id!==id));
  };

  return {links,loading,error,addLink,deleteLink};
};

// ─── Auth: useAuth hook ──────────────────────────────────────────────────────
const useAuth=()=>{
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    const sb=getSupabase();
    if(!sb){setLoading(false);return;}
    // Get current session
    sb.auth.getSession().then(({data})=>{setUser(data?.session?.user||null);setLoading(false);});
    // Subscribe to auth changes (login, logout, token refresh)
    const{data:listener}=sb.auth.onAuthStateChange((_event,session)=>{setUser(session?.user||null);});
    return ()=>{try{listener?.subscription?.unsubscribe();}catch(e){}};
  },[]);
  const signOut=async()=>{const sb=getSupabase();if(sb)await sb.auth.signOut();};
  return {user,loading,signOut};
};

// ─── Login Screen ────────────────────────────────────────────────────────────
const LoginScreen=()=>{
  const[email,setEmail]=useState("");
  const[state,setState]=useState("idle"); // idle | sending | sent | error
  const[error,setError]=useState("");
  const submit=async()=>{
    if(!email||!email.includes("@")){setError("Enter a valid email");return;}
    setState("sending");setError("");
    try{
      const sb=getSupabase();
      if(!sb){throw new Error("Supabase not ready, refresh the page");}
      // We deliberately do not check the {error} returned by signInWithOtp.
      // With shouldCreateUser:false, an unregistered email returns an explicit
      // error ("user not found" / "signups disabled") — surfacing that would
      // let an attacker enumerate valid invited users. Show the same neutral
      // confirmation regardless of Supabase's response. Real infrastructure
      // errors (network down, client not ready) still throw and reach catch.
      await sb.auth.signInWithOtp({email,options:{shouldCreateUser:false,emailRedirectTo:typeof window!=="undefined"?window.location.origin:undefined}});
      setState("sent");
    }catch(e){
      setError(e.message||"Failed to send magic link");
      setState("error");
    }
  };
  return (<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg,padding:"24px"}}>
    <div style={{maxWidth:420,width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"36px 32px",animation:"fadeIn 0.3s ease-out"}}>
      {/* Logo */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
        <div style={{width:36,height:36,borderRadius:8,background:`linear-gradient(135deg,${C.accent},#E8C06A)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:C.bg}}>H</div>
        <div style={{fontSize:18,fontWeight:700,color:C.bright,letterSpacing:"-0.01em"}}>Honoroll</div>
      </div>
      {/* Title */}
      <h1 style={{fontFamily:font,fontSize:22,fontWeight:600,color:C.bright,letterSpacing:"-0.02em",margin:"0 0 8px"}}>Sign in to dashboard</h1>
      <p style={{fontSize:13,color:C.muted,lineHeight:1.5,margin:"0 0 24px"}}>We'll send you a magic link. No password required.</p>
      {/* Form */}
      {state!=="sent"&&(<>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Email address</label>
        <input
          type="email"
          value={email}
          onChange={e=>{setEmail(e.target.value);setError("");}}
          onKeyDown={e=>{if(e.key==="Enter"&&!state.includes("send"))submit();}}
          placeholder="you@honoroll.com"
          autoFocus
          disabled={state==="sending"}
          style={{width:"100%",background:"rgba(200,205,211,0.05)",border:`1px solid ${error?"rgba(248,113,113,0.4)":C.border}`,borderRadius:8,padding:"11px 14px",fontSize:14,fontFamily:font,color:C.bright,outline:"none",boxSizing:"border-box",marginBottom:14}}
        />
        {error&&<div style={{fontSize:12,color:C.red,marginBottom:14,padding:"8px 12px",background:C.redSoft,borderRadius:6}}>{error}</div>}
        <button
          onClick={submit}
          disabled={state==="sending"||!email}
          style={{width:"100%",padding:"12px",fontSize:14,fontWeight:600,fontFamily:font,color:C.bg,background:state==="sending"||!email?"rgba(200,205,211,0.1)":`linear-gradient(135deg,${C.accent},#E8C06A)`,border:"none",borderRadius:8,cursor:state==="sending"||!email?"not-allowed":"pointer",transition:"all 0.2s",opacity:state==="sending"||!email?0.5:1}}
        >
          {state==="sending"?"Sending magic link...":"Send magic link"}
        </button>
      </>)}
      {state==="sent"&&(<div style={{textAlign:"center",padding:"20px 0"}}>
        <div style={{fontSize:32,marginBottom:12}}>✉️</div>
        <div style={{fontSize:15,fontWeight:600,color:C.bright,marginBottom:6}}>Check your inbox</div>
        <div style={{fontSize:13,color:C.muted,lineHeight:1.5,marginBottom:18}}>If <span style={{color:C.bright,fontFamily:mono}}>{email}</span> is registered, a magic link is on its way. Click it to sign in.</div>
        <button onClick={()=>{setState("idle");setEmail("");}} style={{fontSize:12,color:C.muted,background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontFamily:mono}}>Use a different email</button>
      </div>)}
      <div style={{marginTop:24,paddingTop:18,borderTop:`1px solid ${C.border}`,fontSize:11,color:C.dim,textAlign:"center",lineHeight:1.5}}>Access by invitation only. Contact your administrator if you need an account.</div>
    </div>
  </div>);
};

// Outer App: only auth-related hooks live here. Either renders LoginScreen or AuthenticatedApp.
function App(){
  const{user,loading:authLoading,signOut}=useAuth();
  // Fires once per page load — accent line slides across the top, then unmounts.
  const[showShimmer,setShowShimmer]=useState(true);
  useEffect(()=>{const t=setTimeout(()=>setShowShimmer(false),1800);return()=>clearTimeout(t);},[]);
  if(authLoading) return (<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}>{showShimmer&&<div className="page-shimmer"/>}<div style={{display:"flex",gap:6}}>{[0,1,2].map(i=>(<div key={i} style={{width:8,height:8,borderRadius:"50%",background:C.accent,animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite`}}/>))}</div></div>);
  if(!user) return (<>{showShimmer&&<div className="page-shimmer"/>}<LoginScreen/></>);
  // `key={user.id}` forces a clean remount of every hook (drafts, settings,
  // calendar, etc.) when the user changes — defensive guard so one user's
  // in-memory state never carries over to the next.
  return (<>{showShimmer&&<div className="page-shimmer"/>}<AuthenticatedApp key={user.id} user={user} signOut={signOut}/></>);
}

// All the dashboard hooks/logic live here, only mounted when user is authenticated.
function AuthenticatedApp({user,signOut}){
  const[tab,setTab]=useState("analytics");
  const[showSettings,setShowSettings]=useState(false);
  const[rangeId,setRangeId]=useState("24h");
  const[compareMode,setCompareMode]=useState("previous");
  // Drafts (posts/thread/article/tone) live in localStorage so they survive a
  // refresh. Scope the key by user.id so multiple users on the same browser
  // never see each other's in-progress drafts.
  const contentStateKey=`honoroll_content_state_${user?.id||"anon"}`;
  const[contentState,setContentState]=useState(()=>{
    try{const s=typeof localStorage!=="undefined"?localStorage.getItem(contentStateKey):null;
      const parsed=s?JSON.parse(s):null;
      if(parsed){const{calendar,...rest}=parsed;return {posts:null,thread:null,article:null,tone:"founder",...rest};}
      return {posts:null,thread:null,article:null,tone:"founder"};
    }catch(e){return{posts:null,thread:null,article:null,tone:"founder"};}
  });
  useEffect(()=>{try{if(typeof localStorage!=="undefined")localStorage.setItem(contentStateKey,JSON.stringify(contentState));}catch(e){}},[contentState,contentStateKey]);
  // One-time cleanup of the legacy unscoped key (predates the multi-user fix)
  useEffect(()=>{try{if(typeof localStorage!=="undefined")localStorage.removeItem("honoroll_content_state");}catch(e){}},[]);
  // Brand assets now in Supabase + Storage (per user)
  const brandAssets=useBrandAssets(user);
  // One-time cleanup of old localStorage entry
  useEffect(()=>{try{if(typeof localStorage!=="undefined")localStorage.removeItem("honoroll_brand_assets");}catch(e){}},[]);
  // UTM links now stored in Supabase (per user)
  const utmLinks=useUtmLinks(user);
  // One-time cleanup of old localStorage entry
  useEffect(()=>{try{if(typeof localStorage!=="undefined")localStorage.removeItem("honoroll_utm_history");}catch(e){}},[]);
  // Context files now stored in Supabase (per user)
  const ctxFiles=useContextFiles(user);
  // One-time cleanup: drop old localStorage data (we no longer persist context_files there)
  useEffect(()=>{try{if(typeof localStorage!=="undefined")localStorage.removeItem("honoroll_context_files");}catch(e){}},[]);
  // Defaults (tone, lengths, AI model, site info, mock toggle) now stored in Supabase user_settings
  const userSettings=useUserSettings(user);
  // Keep the module-level AI model in sync with the user's chosen setting
  useEffect(()=>{setActiveAIModel(userSettings.settings.aiModel);},[userSettings.settings.aiModel]);
  // Mirror user id to the module-level CURRENT_USER_ID so the Umami client
  // cache and other utilities scope their localStorage keys per-user.
  useEffect(()=>{setCurrentUserId(user?.id);return()=>setCurrentUserId(null);},[user?.id]);
  // Derive the analytics site object from user settings
  const site={id:userSettings.settings.umamiWebsiteId,name:userSettings.settings.siteName,domain:userSettings.settings.siteDomain};
  const useMock=userSettings.settings.useMockData;
  // One-time cleanup of old localStorage entry
  useEffect(()=>{try{if(typeof localStorage!=="undefined")localStorage.removeItem("honoroll_defaults");}catch(e){}},[]);
  // Calendar entries now stored in Supabase (per user)
  const calendarEntries=useCalendarEntries(user);

  const handleTabChange=(t)=>{setShowSettings(false);setTab(t);};
  const handleSettings=()=>setShowSettings(s=>!s);

  return (<div style={{fontFamily:font,background:C.bg,color:C.text,minHeight:"100vh"}}>
    <Header active={tab} onChange={handleTabChange} onSettings={handleSettings} settingsActive={showSettings} user={user} onSignOut={signOut}/>
    <div>
      {showSettings?(<div style={{animation:"fadeIn 0.3s ease-out"}}><SettingsPage ctxFiles={ctxFiles} brandAssets={brandAssets} defaults={userSettings.settings} onUpdateDefaults={userSettings.updateSettings} saveState={userSettings.saveState}/></div>)
      :(<>
        {/* All tab panels are kept mounted; visibility is toggled via display:none so each tab keeps its in-memory state (analytics data, scroll position, drafts) until the user explicitly refreshes. */}
        <div style={{display:tab==="analytics"?"block":"none"}}><Dashboard cfg={KEYS} site={site} useMock={useMock} onSettings={handleSettings} rangeId={rangeId} onRangeChange={setRangeId} compareMode={compareMode} onCompareChange={setCompareMode} contextFiles={ctxFiles.files}/></div>
        <div style={{display:tab==="content"?"block":"none"}}><ContentPage analyticsData={MOCK_DATA} contentState={contentState} setContentState={setContentState} contextFiles={ctxFiles.files} defaults={userSettings.settings} onUpdateDefaults={userSettings.updateSettings} calendarEntries={calendarEntries}/></div>
        <div style={{display:tab==="utm"?"block":"none"}}><UtmPage utmLinks={utmLinks}/></div>
      </>)}
    </div>
  </div>);
}
